name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # The repo ships gradlew / gradlew.bat scripts but not the binary
      # gradle-wrapper.jar (it can't be generated by hand). Generate it now
      # so future `gradlew` invocations work, and so Android Studio sees
      # a complete wrapper after cloning the repo.
      - name: Generate Gradle wra
